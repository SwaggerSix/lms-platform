name: Build

# Runs `next build` to catch issues that only surface during the
# production build — e.g. module-init code that reads env vars at
# import time, missing types in compiled output, or new SSR routes
# that break under static analysis. Vercel's deploy step does this
# too, but landing a broken commit and waiting for Vercel to fail is
# wasted feedback time.

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Placeholder values so module-init code reading env doesn't
      # throw at build time. Real production secrets are set in the
      # Vercel project; the build itself is content-only and doesn't
      # talk to Supabase.
      NEXT_PUBLIC_SUPABASE_URL: "http://localhost:54321"
      NEXT_PUBLIC_SUPABASE_ANON_KEY: "ci-anon-key"
      SUPABASE_SERVICE_ROLE_KEY: "ci-service-role-key"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install dependencies
        # `npm ci` errors when the lockfile disagrees with package.json.
        run: npm ci
      - name: Cache Next.js build output
        # `.next/cache` is where Next stores incremental compilation
        # artifacts (Webpack module cache, SWC transforms). Key
        # includes the lockfile (deps change → invalidate) and a hash
        # of every source file (any code change → invalidate, but
        # unchanged builds reuse the prior cache). `restore-keys`
        # falls back to the same lockfile so we always get *some*
        # warm cache when source has churned.
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('src/**/*.ts', 'src/**/*.tsx', 'src/**/*.css') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-
      - name: Next build
        run: npm run build
