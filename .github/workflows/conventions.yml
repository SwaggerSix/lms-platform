name: Conventions

# Fast guardrail check that runs on every PR. The convention tests
# (cache-control audit, mutation no-store, audit-action naming,
# compliance-requirements ban, supabase/pending emptiness, scanner /
# runtime-guard unit tests) take under 5s to execute and catch
# regressions that would otherwise hide in the full Vitest run.

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  # Cancel superseded runs on the same branch; nothing here mutates state.
  group: conventions-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  conventions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install dependencies
        # `npm ci` fails if package.json and package-lock.json disagree,
        # which catches half-committed dependency changes (someone ran
        # `npm install <pkg>` but only committed package.json).
        run: npm ci
      - name: Lint
        # Run before the convention bundle so the cheaper / fail-fast
        # check surfaces obvious mistakes first. Matches the local
        # `npm run check` flow that the pre-push hook uses.
        run: npm run lint
      - name: Run convention guardrails
        run: npm run test:conventions
      - name: Audit production dependencies (high+ severity)
        # `--omit=dev` keeps devDependency findings out of the gate
        # (test tooling churns more than prod). Fails the job if any
        # high or critical CVE lands in the runtime dep tree.
        run: npm audit --omit=dev --audit-level=high
